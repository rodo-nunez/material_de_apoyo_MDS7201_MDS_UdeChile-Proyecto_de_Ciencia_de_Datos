project:
  type: book
  output-dir: _book

book:
  title: "Proyecto de Ciencia de Datos"
  subtitle: "Master of Data Science - Universidad de Chile"
  author: "MDS7201"
  date: today
  sidebar:
    style: docked
    background: dark
  chapters:
    - index.qmd
    - part: "Contenido del Curso"
      chapters:
        - chapters/01-introduccion-curso-libro.qmd
    - part: "Metodologías de Trabajo"
      chapters: 
        - chapters/02-metodologias-ds-libro.qmd
        - chapters/03-metodologias-genericas-libro.qmd
        - chapters/04-metodologias-especificas-libro.qmd
        - chapters/05-herramientas-gestion-libro.qmd
        - chapters/06-manifiesto-programacion-libro.qmd
    - part: "Git"
      chapters: 
        - chapters/07-intro-git-libro.qmd
        - chapters/08-git-intermedio-libro.qmd
    - part: "Linux"
      chapters:         
        - chapters/09-intro-linux-libro.qmd
        - chapters/10-intro-cloud-libro.qmd
    - part: "EDA, Visualización, Storytelling, Comunicación"
      chapters:         
        - chapters/11-eda-libro.qmd
        - chapters/12-visualizacion-libro.qmd
        - chapters/13-storytelling-libro.qmd
        - chapters/14-presentacion-libro.qmd
    - part: "Linux, Cloud, Modularización y Ambientes virtuales"
      chapters:         
        - chapters/15-intro-linux-libro.qmd
        - chapters/16-intro-cloud-libro.qmd
        - chapters/17-modularizacion-libro.qmd
    - part: "Preprocessing, data curation, feature engineering, training and data leakage"
      chapters:    
        - chapters/18-preprocessing-libro.qmd
        - chapters/19-interpretabilidad-libro.qmd
        - chapters/20-causalidad-libro.qmd
    - part: "LLMs y Agentes"
      chapters:    
        - chapters/21-llms-libro.qmd
        - chapters/22-agentes-libro.qmd

# bibliography: references.bib  # Comentado hasta tener citas reales

format:
  html:
    theme:
      dark: [darkly, custom.scss]
    css: styles.css
    toc: true
    toc-depth: 3
    number-sections: true
    number-depth: 3
    code-fold: false
    code-tools: true
    code-copy: true
    link-external-newwindow: true
  pdf:
    documentclass: book
    keep-tex: true
    toc: true
    number-sections: true
    colorlinks: true
    lang: es

language:
  title-block-author-single: "Autor"
  title-block-published: "Fecha"
  toc-title-document: "Contenidos"
  section-title-references: "Referencias"
